<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Dashboard</title>
        <link rel="stylesheet" href="css/tahmin.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    </head>
    <body>
        <div class="sidebar">
            <div class="logo"></div>
            <ul class="menu">
                <li>
                    <a href="anasayfa.html">
                        <i class="fas fa-home"></i>
                        <span>Anasayfa</span>
                    </a>
                </li>
                <li>
                    <a href="subeler.html">
                        <i class="fas fa-building"></i>
                        <span>Şubeler</span>
                    </a>
                </li>
                <li>
                    <a href="urunler.html">
                        <i class="fas fa-coins"></i>
                        <span>Ürünler</span>
                    </a>
                </li>
                <li>
                    <a href="musteriler.html">
                        <i class="fas fa-users"></i>
                        <span>Müşteriler</span>
                    </a>
                </li>
                <li class="active">
                    <a href="tahmin.html">
                        <i class="fas fa-chart-simple"></i>
                        <span>Tahminleme</span>
                    </a>
                </li>
                <li class="logout">
                    <a href="giris.html">
                        <i class="fas fa-power-off"></i>
                        <span>Çıkış</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="main--content">
            <div class="header--wrapper">
                <div class="header--title">
                    <h2>Dashboard</h2>
                </div>
                <div class="user--info">
                    <img src="/resimler/resim.svg" alt="">
                </div>
            </div>
            <div class="container">
                <h3 class="main--title">Tahminleme</h3>
                <div class="chart--container">
                    <div class="input--container">
                        <label for="customerPercentage">Müşteri Yüzdesi Artışı:</label>
                        <input type="number" id="customerPercentage" placeholder="Yüzde Değeri" min="0" step="0.1">
                        <button id="updateButton">Güncelle</button>
                    </div>
                    <canvas id="salesChart"></canvas>
                </div>
                <div class="chart--container">
                    <div class="input--container">
                        <label for="target-value">Hedef Gelir Yüzdesi:</label>
                        <input type="number" id="target-value" placeholder="Yüzde Değeri" min="0" max="100" step="1">
                        <button onclick="updateChart()">Güncelle</button>
                    </div>
                    <canvas id="myChart" width="900" height="300"></canvas>
                </div>
            </div>                 
        </div>
    </body>
    <script src="js/tahmin.js"></script>
</html>
