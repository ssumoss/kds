<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Dashboard</title>
        <link rel="stylesheet" href="css/anasayfa.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <div class="sidebar">
            <div class="logo"></div>
            <ul class="menu">
                <li class="active">
                    <a href="anasayfa.html">
                        <i class="fas fa-home"></i>
                        <span>Anasayfa</span>
                    </a>
                </li>
                <li>
                    <a href="subeler.html">
                        <i class="fas fa-building"></i>
                        <span>Şubeler</span>
                    </a>
                </li>
                <li>
                    <a href="urunler.html">
                        <i class="fas fa-coins"></i>
                        <span>Ürünler</span>
                    </a>
                </li>
                <li>
                    <a href="musteriler.html">
                        <i class="fas fa-users"></i>
                        <span>Müşteriler</span>
                    </a>
                </li>
                <li>
                    <a href="tahmin.html">
                        <i class="fas fa-chart-simple"></i>
                        <span>Tahminleme</span>
                    </a>
                </li>
                <li class="logout">
                    <a href="giris.html">
                        <i class="fas fa-power-off"></i>
                        <span>Çıkış</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="main--content">
            <div class="header--wrapper">
                <div class="header--title">
                    <h2>Dashboard</h2>
                </div>
                <div class="user--info">
                    <img src="/resimler/resim.svg" alt="">
                </div>
            </div>
            <div class="container">
                <div class="box--wrapper">
                    <div class="box">
                        <div class="box--header">
                            <div class="amount">
                                <span class="title">Şube Sayısı</span>
                                <div id="subeSayisi"></div>
                            </div>
                        </div>
                    </div>
                    <div class="box">
                        <div class="box--header">
                            <div class="amount">
                                <span class="title">Müşteri Sayısı</span>
                                <div id="musteriSayisi"></div>
                            </div>
                        </div>
                    </div>
                    <div class="box">
                        <div class="box--header">
                            <div class="amount">
                                <span class="title">Satılan Ürün Sayısı</span>
                                <div id="satisSayisi"></div>
                            </div>
                        </div>
                    </div>
                    <div class="box">
                        <div class="box--header">
                            <div class="amount">
                                <span class="title">Toplam Gelir</span>
                                <div id="toplamGelir"></div>
                            </div>
                        </div>
                    </div>
                    <div class="box">
                        <div class="box--header">
                            <div class="amount">
                                <span class="title">Toplam Brüt Kâr</span>
                                <div id="brutKar"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="chart--container">
                    <select id="yearSelect">
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                      </select>
                    <canvas id="chart1"></canvas>
                    <canvas id="chart2"></canvas>
                </div>
                <div class="chart--container">
                    <canvas id="chart3"></canvas>
                    <canvas id="chart4"></canvas>
                </div>
            </div>          
        </div>
    </body>
    <script src="js/anasayfa.js"></script>
</html>
