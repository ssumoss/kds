<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Dashboard</title>
        <link rel="stylesheet" href="css/musteriler.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <div class="sidebar">
            <div class="logo"></div>
            <ul class="menu">
                <li>
                    <a href="anasayfa.html">
                        <i class="fas fa-home"></i>
                        <span>Anasayfa</span>
                    </a>
                </li>
                <li>
                    <a href="subeler.html">
                        <i class="fas fa-building"></i>
                        <span>Şubeler</span>
                    </a>
                </li>
                <li>
                    <a href="urunler.html">
                        <i class="fas fa-coins"></i>
                        <span>Ürünler</span>
                    </a>
                </li>
                <li class="active">
                    <a href="musteriler.html">
                        <i class="fas fa-users"></i>
                        <span>Müşteriler</span>
                    </a>
                </li>
                <li>
                    <a href="tahmin.html">
                        <i class="fas fa-chart-simple"></i>
                        <span>Tahminleme</span>
                    </a>
                </li>
                <li class="logout">
                    <a href="giris.html">
                        <i class="fas fa-power-off"></i>
                        <span>Çıkış</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="main--content">
            <div class="header--wrapper">
                <div class="header--title">
                    <h2>Dashboard</h2>
                </div>
                <div class="user--info">
                    <img src="/resimler/resim.svg" alt="">
                </div>
            </div>
            <div class="container">
                <h3 class="main--title">Müşteri Verileri</h3>
                <div class="chart--container">
                    <canvas id="grafik1"></canvas>
                    <canvas id="grafik2"></canvas>
                </div>  
                <div class="chart--container">
                    <canvas id="grafik3"></canvas>
                    <canvas id="grafik4"></canvas>
                </div>      
            </div>           
        </div>
    </body>
    <script>
        window.onload = function () {
    ////////////////////////GRAFİK1///////////////////
    fetch('/api/musteri-yas')
        .then(response => {
            if (!response.ok) {
                throw new Error('API isteği başarısız oldu!');
            }
            return response.json();
        })
        .then(data => {
            // API'den gelen veriyi işle
            console.log('API Verisi:', data); // Veriyi kontrol etmek için log ekledik
            const yas = data.map(item => item.yas_araligi);
            const yas_yuzdesi = data.map(item => item.yuzde);

            // Canvas elemanını al
            const grf1 = document.getElementById('grafik1').getContext('2d');

            // Grafik verileri
            const veri1 = {
                labels: yas,
                datasets: [{
                    label: 'Yaş Yüzdesi',
                    data: yas_yuzdesi,
                    backgroundColor: [
                        '#BA5E4A', '#8c3623', '#BD7C6E', '#813524',
                        '#D6573B', '#D49789', '#7A1A05'
                    ],
                    borderWidth: 1,
                }]
            };

            // Grafik konfigürasyonu
            const con1 = {
                type: 'pie',
                data: veri1,
                options: {
                    plugins: {
                        legend: {
                            onHover: handleHover, // Hover için tanımlı bir fonksiyon
                            onLeave: handleLeave  // Leave için tanımlı bir fonksiyon
                        },
                        title: {
                            display: true,
                            text: 'Müşteri Yaş Yüzdeleri'
                        }
                    }
                }
            };

            // Grafiği oluştur
            const grafigim1 = new Chart(grf1, con1);
        })
        .catch(error => {
            console.error('Hata oluştu:', error);
        });

    // Legend hover event fonksiyonları
    function handleHover(event, legendItem) {
        console.log('Legend hover:', legendItem.text);
    }

    function handleLeave(event, legendItem) {
        console.log('Legend leave:', legendItem.text);
    }


    /////////////GRAFİK 2/////////////////
    fetch('/api/musteri-cinsiyet')
        .then(response => {
            if (!response.ok) {
                throw new Error('API isteği başarısız oldu!');
            }
            return response.json();
        })
        .then(data => {
            // API'den gelen veriyi işle
            console.log('API Verisi:', data); // Veriyi kontrol etmek için log ekledik
            const cinsiyet = data.map(item => item.cinsiyet_adi);
            const cinsiyet_yuzdesi = data.map(item => item.yuzde);

            // Canvas elemanını al
            const grf2 = document.getElementById('grafik2').getContext('2d');

            // Grafik verileri
            const veri2 = {
                labels: cinsiyet,
                datasets: [{
                    label: 'Cinsiyet Yüzdesi',
                    data: cinsiyet_yuzdesi,
                    backgroundColor: [
                        '#BA5E4A', '#7A1A05'
                    ],
                    borderWidth: 1,
                }]
            };

            // Grafik konfigürasyonu
            const con2 = {
                type: 'pie',
                data: veri2,
                options: {
                    plugins: {
                        legend: {
                            onHover: handleHover, // Hover için tanımlı bir fonksiyon
                            onLeave: handleLeave  // Leave için tanımlı bir fonksiyon
                        },
                        title: {
                            display: true,
                            text: 'Müşteri Cinsiyet Yüzdeleri'
                        }
                    }
                }
            };

            // Grafiği oluştur
            const grafigim2 = new Chart(grf2, con2);
        })
        .catch(error => {
            console.error('Hata oluştu:', error);
        });

    // Legend hover event fonksiyonları
    function handleHover(event, legendItem) {
        console.log('Legend hover:', legendItem.text);
    }

    function handleLeave(event, legendItem) {
        console.log('Legend leave:', legendItem.text);
    }


    /////////////GRAFİK 3/////////////////// 
    fetch('/api/sevilen-urun')
           .then(response => response.json())
           .then(data => {
                const urun = data.map(item => item.urun_adi);
                const miktar = data.map(item => item.satis_adedi);
                const grf3 = document.getElementById('grafik3').getContext('2d');
            const veri3 = {
                labels: urun,
                datasets: [{
                    label: 'Satış Miktarı',
                    data: miktar,
                    backgroundColor: 'rgba(148, 44, 21, 0.2)',
                    borderColor: 'rgba(148, 44, 21, 1)',
                    borderWidth: 1,
                    borderRadius: 10,
                }]
            };

            const con3 = {
                type: 'bar',
                data: veri3,
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        title: {
                            display: true,
                            text: 'En Çok Tercih Edilen 5 Ürün'
                        }
                    }
                }
            };
            const grafigim3 = new Chart(grf3, con3);
        })

        /////////////GRAFİK 4/////////////////// 
    fetch('/api/sevilmeyen-urun')
           .then(response => response.json())
           .then(data => {
                const urun = data.map(item => item.urun_adi);
                const miktar = data.map(item => item.satis_adedi);
                const grf4 = document.getElementById('grafik4').getContext('2d');
            const veri4 = {
                labels: urun,
                datasets: [{
                    label: 'Satış Miktarı',
                    data: miktar,
                    backgroundColor: 'rgba(148, 44, 21, 0.2)',
                    borderColor: 'rgba(148, 44, 21, 1)',
                    borderWidth: 1,
                    borderRadius: 10,
                }]
            };

            const con4 = {
                type: 'bar',
                data: veri4,
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        title: {
                            display: true,
                            text: 'En Az Tercih Edilen 5 Ürün'
                        }
                    }
                }
            };
            const grafigim4 = new Chart(grf4, con4);
        })



}
    </script>
</html>
