                <div class="chart--container">
                    <div class="input--container">
                        <label for="customerPercentage">Müşteri Yüzdesi Artışı:</label>
                        <input type="number" id="customerPercentage" placeholder="Yüzde Değeri" min="0" step="0.1">
                        <button id="updateButton">Güncelle</button>

                <div class="chart--container">
                    <div class="input--container">

                        <input type="number" id="target-value" placeholder="Yüzde Değeri" min="0" max="100" step="1">

                    <canvas id="myChart" width="900" height="300"></canvas>
                </div>
            </div>                 
        </div>

    <script>
        ////////////////GRAFİK 1///////////////////
       $(document).ready(function() {
    // API'den verileri çek
    $.get('/api/gelir-tahmin', function(data) {
        // Verileri yıllara göre sıralayın
        data.sort((a, b) => a.year - b.year);

        const years = data.map(item => item.year);
        const totalRevenue = data.map(item => item.toplam_gelir);
        const customerCounts = data.map(item => item.musteri_sayisi);  // Müşteri sayısını al

        // Grafik verisi
        const chartData = {
            labels: years,  // Yıllar
            datasets: [{
                label: 'Satış Geliri',
                data: totalRevenue,
                borderColor: 'rgba(148, 44, 21, 1)',
                backgroundColor: 'rgba(148, 44, 21, 0.2)',
                fill: true,
                tension: 0.1
            }]
        };

        // Grafik ayarları
        const chartOptions = {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        };

        // Grafik oluştur
        const ctx = document.getElementById('salesChart').getContext('2d');
        const salesChart = new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: chartOptions
        });

        // Veriyi güncelle
        $('#updateButton').click(function() {
            const customerPercentage = parseFloat($('#customerPercentage').val());
            if (!isNaN(customerPercentage)) {
                // 2024'ün sonundaki gelir ve müşteri sayısını al
                const latestRevenue = totalRevenue[totalRevenue.length - 1];
                const latestCustomerCount = customerCounts[customerCounts.length - 1];

                // 2025 yılı için yeni gelir hesaplama
                const newRevenue2025 = latestRevenue * (1 + customerPercentage / 100);

                // 2025 yılı için yeni müşteri sayısı hesaplama
                const newCustomerCount2025 = latestCustomerCount * (1 + customerPercentage / 100);

                // 2025 yılı ve gelir/müşteri sayısı ekleme
                salesChart.data.labels.push(2025);
                salesChart.data.datasets[0].data.push(newRevenue2025);

                // Yeni müşteri sayısını ekleyelim (grafikte gösterilmeyecek ama isterseniz tooltip ya da başka bir şekilde görselleştirebilirsiniz)
                // Örneğin, müşteri sayısı gösteren bir grafik eklemek isterseniz, burada bir yeni veri kümesi oluşturabilirsiniz

                // Yılları küçükten büyüğe sıralayın
                const sortedLabels = salesChart.data.labels.sort((a, b) => a - b);
                const sortedData = sortedLabels.map(label => {
                    const index = salesChart.data.labels.indexOf(label);
                    return salesChart.data.datasets[0].data[index];
                });

                // Sıralanmış veriyi grafiğe uygulayın
                salesChart.data.labels = sortedLabels;
                salesChart.data.datasets[0].data = sortedData;

                // Grafik verisini güncelle
                salesChart.update();
            }
        });
    });
});


    //////////////////GRAFİK 2////////////////////
    let chart; // Chart.js grafiği burada saklanacak

        // API'den veri çekme fonksiyonu
        async function fetchChartData() {
            try {
                const response = await fetch('/api/sube-gelir-yuzdesi'); // API endpoint'inizi yazın
                const data = await response.json();

                // Gelen veriyi işleme
                const labels = data.map(item => item.sube_adi); // Şube adları
                const percentages = data.map(item => item.gelir_yuzdesi); // Gelir yüzdeleri

                // Grafik oluşturma
                createChart(labels, percentages);
            } catch (error) {
                console.error("API'den veri alınırken hata oluştu:", error);
            }
        }

        // Chart.js grafiği oluşturma fonksiyonu
        function createChart(labels, data) {
            const ctx = document.getElementById('myChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Gelir Yüzdesi',
                        data: data,
                        backgroundColor: 'rgba(148, 44, 21, 0.2)',
                        borderColor: 'rgba(148, 44, 21, 1)',
                        borderWidth: 1,
                        borderRadius: 10 
                    }]
                },
                options: {
                    responsive: false, // Responsive kapalı
                    plugins: {
                        annotation: {
                            annotations: []  // Hedef çizgisi burada olacak
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                        }
                    }
                }
            });
        }

        // Hedef değeri güncelleme fonksiyonu
        function updateChart() {
            // Kullanıcıdan hedef değeri al
            const targetValue = parseInt(document.getElementById('target-value').value);

            // Hedef çizgisi ekleme
            chart.options.plugins.annotation.annotations = [{
                type: 'line',
                scaleID: 'y',
                value: targetValue,
                borderColor: 'black',
                borderWidth: 2,
                label: {
                    enabled: true,
                    content: `Hedef: ${targetValue}%`,
                    position: 'center',
                    backgroundColor: 'rgba(255, 0, 0, 0.5)',
                    font: {
                        size: 12
                    }
                }
            }];
            
            // Grafiği güncelle
            chart.update();
        }

        // Sayfa yüklendiğinde API'den veriyi çek ve grafiği oluştur
        fetchChartData();


        
 
    </script>
</html>
